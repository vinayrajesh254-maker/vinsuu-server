}

.topHeader{

}

.backBtn{
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    width:34px;
    height:34px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.2s;
    flex-shrink:0;
}

.backBtn:hover{
    background:rgba(255,255,255,0.25);
}

.topHeaderTitle{

<div class="container">
    <div class="box">
        <h1 id="title">Terms & condition</h1>
        <div id="content" class="content"></div>
    </div>
</div>

<script>
const API = window.location.origin + "/api";

async function load(){
    const res = await fetch(API + "/admin/content/terms");
    const data = await res.json();

    document.getElementById("title").innerText = data.title || "Terms & Conditions";
    document.getElementById("content").innerHTML = data.content || "";
}

load();
</script>
