<script>
const API = window.location.origin + "/api";

async function load(){
    const res = await fetch(API + "/admin/content/customerTerms");
    const data = await res.json();

    document.getElementById("title").innerText = data.title || "Terms for Customer";
    document.getElementById("content").innerHTML = data.content || "";
    
}
load();

load();
function goBack(){

}
