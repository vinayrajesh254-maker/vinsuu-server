<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Panel - Vinsuu</title>
    <meta name="description"
      content="Secure staff dashboard for Vinsuu service professionals to manage profile, wallet, service requests and account details.">
<meta name="author" content="Vinsuu">
<meta name="theme-color" content="#1a3fd4">
<meta name="robots" content="noindex,nofollow">
<meta name="googlebot" content="noindex,nofollow">
<link rel="canonical" href="https://www.vinsuu.com/staff.html">
<meta property="og:title" content="Staff Panel | Vinsuu">
<meta property="og:description"content="Secure dashboard for Vinsuu staff members.">
<meta property="og:url"content="https://www.vinsuu.com/staff.html">
<meta property="og:type" content="website">
<meta property="og:image"content="https://www.vinsuu.com/logo.png">
<meta property="og:image:alt"content="Vinsuu Home Services Logo">
<meta property="og:site_name"content="Vinsuu">
<meta name="twitter:card"content="summary_large_image">
<meta name="twitter:title" content="Staff Panel | Vinsuu">
<meta name="twitter:description"content="Secure dashboard for Vinsuu staff members.">
<meta name="twitter:image" content="https://www.vinsuu.com/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>
<script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>

<body>
<div id="topNotification" class="topNotification"></div>
    <!-- SIDE MENU OVERLAY -->
    <div class="sideOverlay" id="sideOverlay" onclick="closeMenu()"></div>

    <!-- SIDE MENU -->
    <div class="sideMenu" id="sideMenu">
        <a href="index.html" onclick="closeMenu()">🏠 Home</a>
        <a href="#" onclick="closeMenu()">📱 App Download</a>
        <a href="about.html" onclick="closeMenu()">ℹ️ About Us</a>
        <a href="#footerContact" onclick="closeMenu()">☎️ Contact Us</a>
    </div>

    <!-- ========================== DESKTOP ========================== -->
    <!-- HEADER -->
    <div class="header">
        <a href="index.html" class="logo" id="logoBox">
            <div class="logo-icon">🏠</div>VINSUU
        </a>
        <nav class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="service-list.html">Services </a>
            <a href="category.html">Categories</a>
            <a href="about.html">About Us</a>
            <a href="#footerContact">Contact Us</a>
        </nav>
    </div>
    <!-- TOP HEADER -->
    <div class="topHeader">
        <div class="topHeaderLeft">
            <button class="backBtn" onclick="history.back()">←</button>
            <h1 class="topHeaderTitle">Staff Profile</h1>
        </div>
        <div class="dot-staff-menu">
            <ul class="dot-staff-menu-btn" onclick="toggleStaffMenu(event)">
                <li></li>
                <li></li>
                <li></li>
            </ul>
            <div id="staffDropdown" class="dot-staff-menu-dropdown">
                <button onclick="handleMenuClick(openWallet)">💰 Wallet</button>
                <button onclick="handleMenuClick(openLoginActivity)">📊 Login Activity</button>
                <button onclick="handleMenuClick(openAccountDetails)">🏦 Account Details</button>
                <button onclick="handleMenuClick(openIDCard)">🪪 ID Card</button>
                
                <button onclick="closeStaffMenu()" style="color:var(--red);">✕ Close</button>
            </div>
        </div>
    </div>

    <!-- PAGE -->
    <div class="container">
        <div id="profileBox"></div>

        <div class="sectionHeading">My Service Requests</div>

        <div class="tabRow">
            <button id="pendingTab" class="tab activeTab" onclick="switchTab('pending')">Pending Service</button>
            <button id="completedTab" class="tab" onclick="switchTab('completed')">Complete Service</button>
        </div>

        <div id="requests"></div>
    </div>

    <!-- UNIT POPUP -->
    <div id="unitOverlay" class="unitOverlay" onclick="closeUnitPopup()"></div>
    <div id="unitPopup" class="unitPopup">
        <div class="unitHeader">
            <span>⭐ Unit Balance</span>
            <button class="unitCloseBtn" onclick="closeUnitPopup()">✕</button>
        </div>
        <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">Purchase Unit Balance</h3>
        <table>
            <thead>
                <tr>
                    <th>Unit Balance</th>
                    <th>Purchase Price (₹)</th>
                </tr>
            </thead>
            <tbody id="unitPopupBody"></tbody>
        </table>
    </div>
    
<!-- BOTTOM NAV (Mobile) -->
    <div class="bottomNav">
        <button class="active" onclick="location.href='index.html'">
            <span class="bnIcon">🏠</span>Home
        </button>
        <button onclick="location.href='category.html'">
            <span class="bnIcon">📋</span>Category
        </button>
        <button onclick="location.href='staff.html'">
            <span class="bnIcon">👤</span>Staff
        </button>
        <button onclick="location.href='profile.html'">
            <span class="bnIcon">😊</span>Profile
        </button>
    </div>
    <audio id="notifySound">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>
<script src="staffscript.js" defer></script>
</body>

</html>
